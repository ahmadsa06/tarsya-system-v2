name: بناء ونشر (تصدير ثابت)

on:
  push:
    branches: [main]
  workflow_dispatch: {}

# مطلوب لدفع البناء إلى فرع deploy عبر الرمز التلقائي
permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: سحب الكود
        uses: actions/checkout@v4

      - name: تهيئة Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: تثبيت الاعتماديات
        run: npm ci

      - name: بناء (تصدير ثابت إلى out/)
        run: npm run build

      # يدفع محتوى out/ إلى فرع deploy؛ يسحبه Hostinger Git بلا حاجة لـ FTP.
      - name: نشر إلى فرع deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
          publish_branch: deploy
          force_orphan: true
          commit_message: "build: تحديث الموقع الثابت"
