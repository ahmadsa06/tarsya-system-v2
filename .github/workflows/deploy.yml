name: نشر إلى Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: سحب الكود
        uses: actions/checkout@v4

      - name: تهيئة Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: تثبيت الاعتماديات
        run: npm ci

      - name: بناء (تصدير ثابت إلى out/)
        run: npm run build

      - name: النشر عبر FTP إلى النطاق الفرعي
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          # مجلد النطاق الفرعي على Hostinger، يجب أن ينتهي بشرطة مائلة. مثال: /public_html/system/
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          local-dir: ./out/
